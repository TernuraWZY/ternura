<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ternura Agent Console</title>
    <script>
      (() => {
        const key = "ternura-theme";
        let theme = "";
        try {
          theme = window.localStorage.getItem(key) || "";
        } catch {
          theme = "";
        }
        if (theme !== "dark" && theme !== "light") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Ternura status">
        <header class="brand">
          <div class="brand-mark" aria-hidden="true">T</div>
          <div>
            <h1>Ternura</h1>
            <p>Memory</p>
          </div>
        </header>

        <section class="status-list" aria-label="Runtime status">
          <div class="status-row">
            <span>Model</span>
            <strong id="modelName">MiniMax-M2.7</strong>
          </div>
          <div class="status-row">
            <span>Session</span>
            <strong id="sessionState">Idle</strong>
          </div>
          <div class="status-row run-status-row">
            <span>Run</span>
            <strong id="runState">No run</strong>
          </div>
          <div class="status-row">
            <span>Context</span>
            <strong id="contextState">Ready</strong>
          </div>
          <div class="status-row">
            <span>Memory</span>
            <strong id="memoryState">Ready</strong>
          </div>
        </section>

        <section class="events-panel" aria-label="Events">
          <h2>Events</h2>
          <ol id="eventsList" class="events-list">
            <li class="event active">Ready</li>
          </ol>
        </section>

        <button id="resetButton" class="reset-button" type="button">
          <span aria-hidden="true">↻</span>
          <span>Reset chat</span>
        </button>
      </aside>

      <section class="console">
        <header class="console-header">
          <div>
            <h2>Agent Console</h2>
            <p id="consoleStatus">Ready</p>
          </div>
          <div class="header-actions">
            <button id="themeButton" class="theme-button" type="button" title="Switch theme" aria-label="Switch theme" aria-pressed="false">
              <span class="theme-icon" aria-hidden="true"></span>
            </button>
            <button id="stopButton" class="stop-button" type="button" title="Stop response" aria-label="Stop response">
              <span aria-hidden="true"></span>
            </button>
          </div>
        </header>

        <section id="conversation" class="conversation" aria-live="polite"></section>

        <form id="composer" class="composer">
          <textarea id="promptInput" name="prompt" placeholder="Ask Ternura..." rows="3"></textarea>
          <button id="sendButton" class="send-button" type="submit">
            <span aria-hidden="true">↗</span>
            <span>Send</span>
          </button>
        </form>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
